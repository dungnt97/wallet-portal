name: Deploy — Staging

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: Build image (${{ matrix.service }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: [admin-api, wallet-engine, policy-engine, ui]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Derive image tag
        id: meta
        # Safe: github.sha is a commit hash, not user-controlled text
        run: |
          echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "short_sha=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.service }}/Dockerfile
          push: false
          tags: |
            wallet-portal-${{ matrix.service }}:${{ steps.meta.outputs.short_sha }}
            wallet-portal-${{ matrix.service }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

