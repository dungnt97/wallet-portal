name: Docker Build

on:
  pull_request:
    branches: [main]
    paths:
      - '**/Dockerfile'
      - '**/Dockerfile.*'
      - 'apps/admin-api/package.json'
      - 'apps/wallet-engine/package.json'
      - 'apps/policy-engine/go.mod'
      - 'apps/ui/package.json'
      - 'pnpm-lock.yaml'
  push:
    branches: [main]
    paths:
      - '**/Dockerfile'
      - '**/Dockerfile.*'
  workflow_dispatch:

# Smoke-build all service Dockerfiles to verify they compile.
# Reports image size + layer count. Does NOT push to any registry.
# Each service builds independently; matrix strategy allows parallel execution.

jobs:
  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: admin-api
            context: apps/admin-api
            dockerfile: apps/admin-api/Dockerfile
          - service: wallet-engine
            context: apps/wallet-engine
            dockerfile: apps/wallet-engine/Dockerfile
          - service: policy-engine
            context: apps/policy-engine
            dockerfile: apps/policy-engine/Dockerfile
          - service: ui
            context: .
            dockerfile: apps/ui/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service }} image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          load: true
          tags: wallet-portal/${{ matrix.service }}:ci
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Report image size
        run: |
          image="wallet-portal/${{ matrix.service }}:ci"
          size=$(docker image inspect "${image}" --format '{{.Size}}')
          size_mb=$((size / 1024 / 1024))
          layers=$(docker image inspect "${image}" --format '{{len .RootFS.Layers}}')
          echo "### ${{ matrix.service }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Size: ${size_mb} MB" >> "$GITHUB_STEP_SUMMARY"
          echo "- Layers: ${layers}" >> "$GITHUB_STEP_SUMMARY"
          echo ""
          echo "${{ matrix.service }}: ${size_mb} MB, ${layers} layers"
