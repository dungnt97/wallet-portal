name: E2E — vertical slice

on:
  pull_request:

jobs:
  e2e:
    name: Vertical slice deposit flow
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start docker-compose stack
        working-directory: infra
        run: |
          docker compose up -d postgres redis
          # Wait for postgres and redis to be healthy
          docker compose run --rm -e WAIT_HOSTS=postgres:5432,redis:6379             --no-deps --entrypoint sh postgres             -c "until pg_isready -h postgres -U postgres; do sleep 1; done" 2>/dev/null || true
          sleep 5

      - name: Run vertical slice test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/wallet_portal
          REDIS_URL: redis://localhost:6379
        run: pnpm --filter @wp/wallet-engine test:vertical-slice

      - name: Dump docker logs on failure
        if: failure()
        working-directory: infra
        run: docker compose logs
