# golangci-lint v2 configuration for policy-engine
# Runs in CI via lint-typecheck job. Only enable linters with clear signal-to-noise ratio.
version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck      # Unchecked errors — must handle or explicitly ignore
    - govet         # Mirrors go vet (vet-based checks)
    - staticcheck   # Comprehensive static analysis (SA, S, QF checks; includes gosimple in v2)
    - ineffassign   # Detects ineffectual assignments
    - unused        # Dead code detection

  settings:
    errcheck:
      check-type-assertions: false  # Allow unguarded type assertions in test helpers
      check-blank: false            # Allow explicit _ = expr discards

issues:
  max-issues-per-linter: 50
  max-same-issues: 5
