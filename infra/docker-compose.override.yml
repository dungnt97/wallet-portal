# Dev overrides — mount source directories for hot-reload.
# Automatically merged by docker compose when present.
# Uses :cached flag for macOS performance (see also :delegated as alternative).

services:
  admin-api:
    volumes:
      - ../apps/admin-api/src:/app/src:cached
      - ../apps/admin-api/package.json:/app/package.json:ro
    command: ['pnpm', 'dev']
    environment:
      NODE_ENV: development
      LOG_LEVEL: debug

  wallet-engine:
    volumes:
      - ../apps/wallet-engine/src:/app/src:cached
      - ../apps/wallet-engine/package.json:/app/package.json:ro
    command: ['pnpm', 'dev']
    environment:
      NODE_ENV: development
      LOG_LEVEL: debug

  policy-engine:
    volumes:
      - ../apps/policy-engine:/app:cached
    environment:
      LOG_LEVEL: debug

  ui:
    volumes:
      - ../apps/ui/src:/app/src:cached
    environment:
      NODE_ENV: development
