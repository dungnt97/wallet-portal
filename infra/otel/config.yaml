# OpenTelemetry Collector configuration
# Local dev: receives from all services, exports to Jaeger + stdout.
# Production (ECS sidecar): exports to Grafana Cloud OTLP endpoint.
# Env vars injected at runtime (ECS task secrets / docker-compose .env):
#   OTEL_EXPORTER_OTLP_ENDPOINT  — Grafana Cloud OTLP gateway URL
#   OTEL_EXPORTER_OTLP_HEADERS   — "Authorization=Basic <base64>" or bearer token
#   DEPLOY_ENV                   — staging | production (resource attribute)
#   OTEL_SERVICE_NAMESPACE       — e.g. "wallet-portal" (resource attribute)

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  memory_limiter:
    check_interval: 1s
    # Reject new data at 80% of container memory limit to prevent OOM
    limit_percentage: 80
    spike_limit_percentage: 20

  batch:
    timeout: 1s
    send_batch_size: 512
    send_batch_max_size: 1024

  # Inject deployment metadata onto every span/metric/log
  resource:
    attributes:
      - key: service.namespace
        value: "wallet-portal"
        action: upsert
      - key: deployment.environment
        from_attribute: DEPLOY_ENV
        action: upsert

exporters:
  # ── Local dev: log spans to stdout ───────────────────────────────────────
  debug:
    verbosity: normal
    sampling_initial: 5
    sampling_thereafter: 200

  # ── Local dev: forward to Jaeger when using observability profile ────────
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true

  # ── Grafana Cloud OTLP (production / staging) ───────────────────────────
  # Disabled in local dev — uncomment + reference in pipelines via a prod
  # override config when OTEL_EXPORTER_OTLP_ENDPOINT / _HEADERS are provided.
  # otlphttp/grafana:
  #   endpoint: ${env:OTEL_EXPORTER_OTLP_ENDPOINT}
  #   headers:
  #     Authorization: ${env:OTEL_EXPORTER_OTLP_HEADERS}
  #   retry_on_failure:
  #     enabled: true
  #     initial_interval: 5s
  #     max_interval: 30s
  #     max_elapsed_time: 120s
  #   sending_queue:
  #     enabled: true
  #     num_consumers: 4
  #     queue_size: 100

  # ── Prometheus scrape endpoint (local + ECS) ─────────────────────────────
  prometheus:
    endpoint: '0.0.0.0:8889'
    # Drop high-cardinality labels at collector boundary
    metric_expiration: 5m

service:
  # Extension for health-check probe (ECS uses this for task health)
  extensions: [health_check]

  pipelines:
    # ── Traces ───────────────────────────────────────────────────────────────
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      # Dev: debug only; prod adds otlphttp/grafana via override config
      exporters: [debug]

    # ── Metrics ──────────────────────────────────────────────────────────────
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [prometheus]

    # ── Logs ─────────────────────────────────────────────────────────────────
    logs:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [debug]

  telemetry:
    logs:
      level: info
    metrics:
      readers:
        - pull:
            exporter:
              prometheus:
                host: 0.0.0.0
                port: 8888

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
    path: "/"
