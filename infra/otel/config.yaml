# OpenTelemetry Collector configuration for local development
# Receives traces from all services via OTLP HTTP/gRPC and logs them to stdout
# For observability profile: traces also forwarded to Jaeger

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024
  memory_limiter:
    check_interval: 1s
    limit_mib: 256

exporters:
  # Log all spans to stdout — useful for verifying traces arrive
  debug:
    verbosity: normal
    sampling_initial: 5
    sampling_thereafter: 200

  # Forward to Jaeger when using observability profile
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true

  # Prometheus exporter for collector self-metrics
  prometheus:
    endpoint: '0.0.0.0:8889'

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [debug]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [prometheus]

  telemetry:
    logs:
      level: info
    metrics:
      # Use readers format for otelcol-contrib >= 0.87 (replaces deprecated address field)
      readers:
        - pull:
            exporter:
              prometheus:
                host: 0.0.0.0
                port: 8888
