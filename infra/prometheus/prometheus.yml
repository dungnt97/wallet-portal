# Prometheus scrape configuration for wallet-portal local stack
# Scrapes /metrics from all 3 backend services + OTel collector self-metrics

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: wallet-portal-services
    static_configs:
      - targets:
          - 'admin-api:3001'
          - 'wallet-engine:3002'
          - 'policy-engine:3003'
    metrics_path: /metrics

  - job_name: otel-collector
    static_configs:
      - targets:
          - 'otel-collector-base:8888'
    metrics_path: /metrics

  - job_name: otel-collector-exported
    static_configs:
      - targets:
          - 'otel-collector-base:8889'
    metrics_path: /metrics

# ── Alert rules (Phase 06) ────────────────────────────────────────
rule_files:
  - "rules/slice12-alerts.yml"

# ── Alertmanager routing (Phase 06) ──────────────────────────────
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 'alertmanager:9093'
