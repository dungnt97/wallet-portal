# Redis configuration for local development
# AOF persistence enabled so data survives container restarts

# Persistence — append-only file (safer than RDB snapshots for dev)
appendonly yes
appendfsync everysec

# Save RDB snapshot as backup (every 60s if >= 1 key changed)
save 60 1

# Memory limit — reasonable default for dev machine
maxmemory 256mb
maxmemory-policy allkeys-lru

# Bind to all interfaces inside the container
bind 0.0.0.0

# No password required in dev (compose network is internal)
# requirepass <change_in_prod>

# Disable protected-mode so healthcheck redis-cli ping works without password
protected-mode no

# Log level
loglevel notice
